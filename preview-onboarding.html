<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wx-assist Onboarding Preview (Original 4-step)</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-main:#ffffff;--bg-card:#fafafa;--bg-raised:#f0f0f0;
      --bg-inset:#e8e8e8;--text-main:#0d0d0d;--text-muted:#5c5c5c;
      --border-main:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.12);
      --brand-green:#18E299;--brand-green-hover:#0fa76e;--brand-green-light:rgba(24,226,153,0.12);
      --status-info:#3772cf;--status-info-soft:rgba(55,114,207,0.08);
      --status-warn:#c37d0d;--status-warn-soft:rgba(195,125,13,0.08);
      --status-error:#d45656;--status-error-soft:rgba(212,86,86,0.08);
      --avatar-bg:#d4fae8;
    }
    .dark{
      --bg-main:#0a0a0a;--bg-card:#111111;--bg-raised:#181818;
      --bg-inset:#1e1e1e;--text-main:#e8e8e8;--text-muted:#777777;
      --border-main:rgba(255,255,255,0.06);--border-strong:rgba(255,255,255,0.10);
      --brand-green:#18E299;--brand-green-hover:#0fa76e;--brand-green-light:rgba(24,226,153,0.15);
      --status-info:#60a5fa;--status-info-soft:rgba(96,165,250,0.14);
      --status-warn:#fbbf24;--status-warn-soft:rgba(251,191,36,0.10);
      --status-error:#f87171;--status-error-soft:rgba(248,113,113,0.14);
      --avatar-bg:rgba(24,226,153,0.15);
    }
    body{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;background:var(--bg-main);color:var(--text-main);min-height:100vh;overflow:hidden}

    /* Sidebar */
    .sidebar{position:fixed;left:0;top:0;width:224px;height:100vh;background:var(--bg-main);border-right:1px solid var(--border-main);z-index:40;display:flex;flex-direction:column;padding:20px}
    .sidebar-header{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .sidebar-logo{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-main);background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--brand-green);position:relative}
    .sidebar-logo-dot{position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--brand-green);box-shadow:0 0 0 2px var(--bg-main);animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite;opacity:75%}
    .sidebar-title{font-size:14px;font-weight:600}
    .sidebar-subtitle{font-size:11px;color:var(--text-muted);font-family:'Geist Mono',monospace;font-weight:500;letter-spacing:0.05em}
    .nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:9999px;font-size:14px;color:var(--text-muted);font-weight:500;cursor:pointer;transition:all 0.2s;position:relative;user-select:none}
    .nav-item:hover:not(.locked){color:var(--text-main);background:rgba(24,24,24,0.6)}
    .nav-item.active{color:var(--brand-green);font-weight:600}
    .nav-item.active .nav-bg{opacity:1}
    .nav-item.locked{opacity:0.4;cursor:not-allowed}
    .nav-bg{position:absolute;inset:0;border-radius:9999px;background:var(--brand-green-light);opacity:0;transition:opacity 0.3s;z-index:-1}
    .nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
    .nav-icon-done{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-icon-active{width:18px;height:18px;border-radius:50%;border:2px solid var(--brand-green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-icon-active-inner{width:8px;height:8px;border-radius:50%;background:var(--brand-green)}
    .nav-icon-locked{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-muted);opacity:0.4}
    .nav-icon-pending{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-main);flex-shrink:0}
    .nav-label{font-size:12px;font-weight:600}
    .nav-desc{font-size:12px;color:var(--text-muted);font-family:'Geist Mono',monospace;letter-spacing:-0.01em}
    @keyframes ping{0%{transform:scale(1);opacity:75%}75%,100%{transform:scale(2.5);opacity:0}}

    /* Main */
    .main-content{margin-left:224px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 32px;position:relative}
    .atmosphere{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;pointer-events:none;opacity:0.6;filter:blur(64px);background:radial-gradient(circle,rgba(24,226,153,0.12) 0%,rgba(24,226,153,0) 70%)}
    .card{width:100%;max-width:672px;background:var(--bg-card);border:1px solid var(--border-main);border-radius:16px;padding:32px;position:relative;z-index:20}
    .page-view{animation:pageIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards}
    @keyframes pageIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}

    /* Shared UI */
    .section-dot{width:6px;height:20px;border-radius:3px;background:var(--brand-green);flex-shrink:0}
    .section-title{font-size:15px;font-weight:600}
    .field-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:8px}
    .field-hint{font-size:11px;color:var(--text-muted);margin-top:4px;font-weight:400}
    .input-mock{padding:12px 16px;background:var(--bg-raised);border:1px solid var(--border-main);border-radius:12px;font-size:13px;font-family:'Geist Mono',monospace;color:var(--text-muted);width:100%}
    .select-mock{padding:12px 16px;background:var(--bg-raised);border:1px solid var(--border-main);border-radius:12px;font-size:13px;color:var(--text-main);width:100%;display:flex;align-items:center;justify-content:space-between}
    .select-mock-chevron{color:var(--text-muted);font-size:10px}
    .btn-pill{padding:10px 24px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
    .btn-pill:active{transform:scale(0.97)}
    .btn-green{background:var(--brand-green-hover);color:white;animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite}
    .btn-green:hover{opacity:0.9}
    .btn-muted{background:var(--bg-raised);color:var(--text-muted);border:1px solid var(--border-main)}
    .btn-muted:hover{color:var(--text-main)}
    .btn-link{background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;font-family:inherit;transition:color 0.15s}
    .btn-link:hover{color:var(--text-main);text-decoration:underline}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.85}}

    /* Checklist */
    .checklist{background:var(--bg-raised);border:1px solid var(--border-main);border-radius:16px;overflow:hidden}
    .checklist-item{padding:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border-main)}
    .checklist-item:last-child{border-bottom:none}
    .check-item-title{font-size:13px;font-weight:600}
    .check-item-desc{font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-muted);margin-top:2px}
    .check-item-desc.warn{color:var(--status-warn)}
    .badge-error{font-size:10px;background:var(--status-error-soft);color:var(--status-error);padding:2px 10px;border-radius:9999px;border:1px solid rgba(212,86,86,0.3);font-weight:700}
    .badge-warn{font-size:10px;background:var(--status-warn-soft);color:var(--status-warn);padding:2px 10px;border-radius:9999px;border:1px solid rgba(195,125,13,0.2);font-weight:600}

    /* Info boxes */
    .info-box{background:var(--bg-raised);border:1px solid var(--border-main);border-radius:12px;padding:16px}
    .info-box-green{background:var(--brand-green-light);border:1px solid rgba(24,226,153,0.2);border-radius:16px;padding:20px;display:flex;align-items:center;gap:12px}
    .info-box-error{background:var(--status-error-soft);border:1px solid rgba(212,86,86,0.2);border-radius:16px;padding:20px;display:flex;align-items:flex-start;gap:12px;color:var(--status-error)}

    /* Feature grid */
    .feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* Bottom bar */
    .sidebar-bottom{border-top:1px solid var(--border-main);padding-top:16px;margin-top:auto;display:flex;flex-direction:column;gap:8px}
    .theme-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;border-radius:9999px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-raised);border:1px solid var(--border-main);color:var(--text-muted);font-family:inherit;transition:all 0.2s}
    .theme-btn:hover{color:var(--text-main);border-color:var(--border-strong)}
    .status-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--bg-raised);border-radius:9999px;border:1px solid var(--border-main)}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--brand-green);position:relative}
    .status-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--brand-green);animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite;opacity:75%}
    .status-label{font-size:10px;color:var(--text-muted);font-family:'Geist Mono',monospace;font-weight:600;letter-spacing:0.08em}

    /* Grid layout for step 2 & 4 */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

    /* Scrollable content area */
    .scroll-area{max-height:calc(100vh - 96px);overflow-y:auto;padding:48px 32px}
  </style>
</head>
<body>
  <div class="atmosphere"></div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div style="flex:1">
      <div class="sidebar-header">
        <div class="sidebar-logo">W<div class="sidebar-logo-dot"></div></div>
        <div><div class="sidebar-title">微信助手</div><div class="sidebar-subtitle">启动工坊</div></div>
      </div>
      <nav style="display:flex;flex-direction:column;gap:4px" id="nav-list">
        <div class="nav-item active" data-step="1" onclick="goToStep(1)">
          <div class="nav-bg"></div>
          <div class="nav-icon-active"><div class="nav-icon-active-inner"></div></div>
          <div><div class="nav-label">环境诊断与密钥</div><div class="nav-desc">诊断系统 & 提取/输入密钥</div></div>
        </div>
        <div class="nav-item locked" data-step="2" onclick="goToStep(2)">
          <div class="nav-bg"></div>
          <div class="nav-icon-locked"><svg width="16" height="16" viewBox="0 0 256 256" fill="none"><rect x="48" y="108" width="160" height="120" rx="12" stroke="currentColor" stroke-width="16"/><path d="M88 108V80a40 40 0 0 1 80 0v28" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg></div>
          <div><div class="nav-label">微信配置</div><div class="nav-desc">设置机器人身份</div></div>
        </div>
        <div class="nav-item locked" data-step="3" onclick="goToStep(3)">
          <div class="nav-bg"></div>
          <div class="nav-icon-locked"><svg width="16" height="16" viewBox="0 0 256 256" fill="none"><rect x="48" y="108" width="160" height="120" rx="12" stroke="currentColor" stroke-width="16"/><path d="M88 108V80a40 40 0 0 1 80 0v28" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg></div>
          <div><div class="nav-label">AI 后端</div><div class="nav-desc">配置 AI 服务</div></div>
        </div>
        <div class="nav-item locked" data-step="4" onclick="goToStep(4)">
          <div class="nav-bg"></div>
          <div class="nav-icon-locked"><svg width="16" height="16" viewBox="0 0 256 256" fill="none"><rect x="48" y="108" width="160" height="120" rx="12" stroke="currentColor" stroke-width="16"/><path d="M88 108V80a40 40 0 0 1 80 0v28" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg></div>
          <div><div class="nav-label">功能设置</div><div class="nav-desc">选择功能开关</div></div>
        </div>
      </nav>
    </div>
    <div class="sidebar-bottom">
      <button class="theme-btn" onclick="toggleTheme()">
        <span id="theme-icon">☀️</span>
        <span id="theme-label">正常模式</span>
      </button>
      <div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-label">DIAGNOSTICS READY</span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="main-content">
    <div class="card" id="card-content"></div>
  </div>

  <script>
    let currentStep = 1;
    let stepDone = { 1: false, 2: false, 3: false, 4: false };

    const STEP_CONTENT = {
      1: () => `
        <div class="page-view">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="section-dot"></div>
              <h3 style="font-size:15px;font-weight:600">环境准备与密钥</h3>
            </div>
            <button class="btn-link">无法获取？手动配置</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:24px">
            <p style="font-size:14px;color:var(--text-muted);line-height:1.7">
              微信助手需要从微信获取加密密钥以读取聊天记录。自动获取过程无侵入，不会影响微信正常使用。
            </p>
            <div class="checklist">
              <div class="checklist-item">
                <div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <span class="check-item-title">Python 运行环境</span>
                  </div>
                  <div class="check-item-desc">Python 3.13.0 · D:\\Python313\\python.exe</div>
                </div>
                <div style="flex-shrink:0;display:flex;align-items:center;height:20px">
                  <svg width="20" height="20" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="108" fill="var(--brand-green)"/><path d="M100 140h56m-28-28v56" stroke="white" stroke-width="20" stroke-linecap="round"/></svg>
                </div>
              </div>
              <div class="checklist-item">
                <div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <span class="check-item-title">Python 依赖库 (requirements.txt)</span>
                  </div>
                  <div class="check-item-desc">42/42 packages installed ✓</div>
                </div>
                <div style="flex-shrink:0;display:flex;align-items:center;height:20px">
                  <svg width="20" height="20" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="108" fill="var(--brand-green)"/><path d="M100 140h56m-28-28v56" stroke="white" stroke-width="20" stroke-linecap="round"/></svg>
                </div>
              </div>
              <div class="checklist-item">
                <div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <span class="check-item-title">微信电脑端状态</span>
                    <span class="badge-warn">可选</span>
                  </div>
                  <div class="check-item-desc warn">微信未运行 — 自动捕获密钥需要微信处于登录状态</div>
                </div>
                <div style="flex-shrink:0;display:flex;align-items:center;height:20px">
                  <div style="width:20px;height:20px;border-radius:50%;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);display:flex;align-items:center;justify-content:center">
                    <span style="color:var(--status-warn);font-size:10px;font-weight:bold">!</span>
                  </div>
                </div>
              </div>
              <div class="checklist-item">
                <div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <span class="check-item-title">本地环境配置文件 (.env)</span>
                  </div>
                  <div class="check-item-desc">.env 文件已存在</div>
                </div>
                <div style="flex-shrink:0;display:flex;align-items:center;height:20px">
                  <svg width="20" height="20" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="108" fill="var(--brand-green)"/><path d="M100 140h56m-28-28v56" stroke="white" stroke-width="20" stroke-linecap="round"/></svg>
                </div>
              </div>
              <div class="checklist-item">
                <div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <span class="check-item-title">本地数据库读写权限</span>
                    <span class="badge-error">阻塞项</span>
                  </div>
                  <div class="check-item-desc warn">数据库路径未配置 — 需完成密钥提取后自动检测</div>
                </div>
                <div style="flex-shrink:0;display:flex;align-items:center;height:20px">
                  <div style="width:20px;height:20px;border-radius:50%;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);display:flex;align-items:center;justify-content:center">
                    <span style="color:var(--status-warn);font-size:10px;font-weight:bold">!</span>
                  </div>
                </div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(24,24,24,0.3);padding:12px 16px;border-radius:16px;border:1px solid var(--border-main)">
              <span style="font-size:12px;color:var(--text-muted)">环境诊断能保障自动提取及数据库访问正常。</span>
              <button class="btn-link" style="color:var(--brand-green)">重新检测</button>
            </div>
            <div style="padding-top:16px;border-top:1px solid var(--border-main);display:flex;align-items:center;gap:16px">
              <button class="btn-pill btn-green" style="display:flex;align-items:center;gap:8px" onclick="markDone(1)">
                <svg width="16" height="16" viewBox="0 0 256 256" fill="none"><path d="M40 128h176M144 56l72 72-72 72" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/></svg>
                开始自动获取
              </button>
              <span class="badge-warn" style="font-size:12px;padding:8px 16px">请登录微信电脑端，否则无法自动获取</span>
            </div>
          </div>
        </div>`,

      2: () => `
        <div class="page-view">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
            <div class="section-dot"></div>
            <h3 style="font-size:15px;font-weight:600">微信配置</h3>
          </div>
          <div style="display:flex;flex-direction:column;gap:24px">
            <div class="grid-2">
              <div class="info-box">
                <div class="field-label" style="margin-bottom:4px">检测到的微信账号</div>
                <div style="font-size:14px;font-family:'Geist Mono',monospace;font-weight:700">wxid_abc123def456</div>
              </div>
              <div class="info-box">
                <div class="field-label" style="margin-bottom:4px">数据路径</div>
                <div style="font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis">C:\\Users\\User\\Documents\\WeChat Files\\wxid_...\\db</div>
              </div>
            </div>
            <div>
              <div class="field-label">机器人名称</div>
              <div class="input-mock">群聊小助手</div>
              <div class="field-hint">在群聊中显示的名称，用于 @ 提及检测</div>
            </div>
            <div>
              <div class="field-label">目标群聊</div>
              <div class="input-mock">*</div>
              <div class="field-hint">输入 * 表示监控所有群聊，指定群名可用逗号分隔</div>
            </div>
            <div style="padding-top:16px">
              <button class="btn-pill btn-green" style="display:flex;align-items:center;gap:8px" onclick="markDone(2)">
                <svg width="16" height="16" viewBox="0 0 256 256" fill="none"><path d="M40 128h176M144 56l72 72-72 72" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/></svg>
                下一步
              </button>
            </div>
          </div>
        </div>`,

      3: () => `
        <div class="page-view">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
            <div class="section-dot" style="background:var(--status-info)"></div>
            <h3 style="font-size:15px;font-weight:600">AI 后端配置</h3>
            <span style="font-size:12px;color:var(--text-muted);margin-left:4px">可跳过，稍后在系统配置中设置</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:24px">
            <div>
              <div class="field-label">AI 站点 URL</div>
              <div class="input-mock">https://api.deepseek.com</div>
              <div class="field-hint">输入 API 根地址，例如 https://api.deepseek.com 或中转地址</div>
            </div>
            <div>
              <div class="field-label">API Key</div>
              <div class="input-mock">sk-••••••••••••••••••••</div>
              <div class="field-hint">该站点的 API Key / Token</div>
            </div>
            <div style="display:flex;gap:12px">
              <button class="btn-pill" style="flex:1;background:var(--brand-green-light);border:1px solid rgba(24,226,153,0.2);color:var(--brand-green);display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px">
                🔍 检测模型
              </button>
            </div>
            <div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;font-size:12px;font-weight:600;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#10b981">
              ⚡ 检测成功：OpenAI 兼容
            </div>
            <div>
              <div class="field-label">模型</div>
              <div class="select-mock">
                <span>deepseek-v4-flash</span>
                <span class="select-mock-chevron">▼</span>
              </div>
              <div class="field-hint">从检测到的模型中选择</div>
            </div>
            <div style="display:flex;align-items:center;gap:16px;padding-top:16px">
              <button class="btn-pill btn-green" style="display:flex;align-items:center;gap:8px" onclick="markDone(3)">
                <svg width="16" height="16" viewBox="0 0 256 256" fill="none"><path d="M40 128h176M144 56l72 72-72 72" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/></svg>
                下一步
              </button>
              <button class="btn-link" style="font-size:14px">跳过，稍后配置</button>
            </div>
          </div>
        </div>`,

      4: () => `
        <div class="page-view">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
            <div class="section-dot"></div>
            <h3 style="font-size:15px;font-weight:600">功能设置</h3>
          </div>
          <div style="display:flex;flex-direction:column;gap:20px">
            <p style="font-size:14px;color:var(--text-muted)">所有功能已默认就绪，无需额外配置。点击下方按钮完成初始设置。</p>
            <div style="padding-top:24px">
              <button class="btn-pill btn-green" style="width:220px;display:flex;align-items:center;justify-content:center;gap:8px" onclick="finishGuide()">
                <svg width="16" height="16" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="108" fill="white"/><path d="M100 140h56m-28-28v56" stroke="var(--brand-green-hover)" stroke-width="20" stroke-linecap="round"/></svg>
                完成设置
              </button>
            </div>
          </div>
        </div>`,

      done: () => `
        <div class="page-view" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 0">
          <div style="width:80px;height:80px;border-radius:50%;background:rgba(24,226,153,0.1);border:1px solid rgba(24,226,153,0.2);display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:scaleIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards">
            <svg width="38" height="38" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="108" fill="var(--brand-green)"/><path d="M100 140h56m-28-28v56" stroke="white" stroke-width="20" stroke-linecap="round"/></svg>
          </div>
          <h2 style="font-size:18px;font-weight:700;margin-bottom:8px">配置就绪</h2>
          <p style="font-size:14px;color:var(--text-muted);font-weight:500">正在启动夜航控制台仪表盘...</p>
        </div>`
    };

    function renderNav() {
      const items = document.querySelectorAll('.nav-item');
      items.forEach(item => {
        const step = parseInt(item.dataset.step);
        const done = stepDone[step];
        const active = currentStep === step;
        const locked = !done && !active && !stepDone[step - 1];

        item.className = 'nav-item' + (active ? ' active' : '') + (locked ? ' locked' : '');

        // Update icon
        const iconContainer = item.querySelector('[data-icon]') || item.querySelector('div:nth-child(2)');
        if (iconContainer) {
          if (done) {
            iconContainer.className = 'nav-icon-done';
            iconContainer.innerHTML = '<svg width="18" height="18" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="108" fill="var(--brand-green)"/><path d="M100 140h56m-28-28v56" stroke="white" stroke-width="20" stroke-linecap="round"/></svg>';
          } else if (active) {
            iconContainer.className = 'nav-icon-active';
            iconContainer.innerHTML = '<div class="nav-icon-active-inner"></div>';
          } else if (locked) {
            iconContainer.className = 'nav-icon-locked';
            iconContainer.innerHTML = '<svg width="16" height="16" viewBox="0 0 256 256" fill="none"><rect x="48" y="108" width="160" height="120" rx="12" stroke="currentColor" stroke-width="16"/><path d="M88 108V80a40 40 0 0 1 80 0v28" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg>';
          } else {
            iconContainer.className = 'nav-icon-pending';
            iconContainer.innerHTML = '';
          }
        }

        // Update bg
        const bg = item.querySelector('.nav-bg');
        if (bg) bg.style.opacity = active ? '1' : '0';
      });
    }

    function renderStep() {
      const content = currentStep === 'done' ? STEP_CONTENT.done() : STEP_CONTENT[currentStep]();
      document.getElementById('card-content').innerHTML = content;
      renderNav();
    }

    function goToStep(step) {
      if (step === 'done' || typeof step === 'string') { currentStep = step; renderStep(); return; }
      const locked = !stepDone[step] && step !== currentStep && !stepDone[step - 1];
      if (!locked && step >= 1 && step <= 4) {
        currentStep = step;
        renderStep();
      }
    }

    function markDone(step) {
      stepDone[step] = true;
      if (step < 4) {
        currentStep = step + 1;
      }
      renderStep();
    }

    function finishGuide() {
      currentStep = 'done';
      renderStep();
    }

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      if (isDark) {
        html.classList.remove('dark');
        document.getElementById('theme-icon').textContent = '🌙';
        document.getElementById('theme-label').textContent = '夜航控制台';
        document.querySelector('.sidebar-subtitle').textContent = '正常模式';
      } else {
        html.classList.add('dark');
        document.getElementById('theme-icon').textContent = '☀️';
        document.getElementById('theme-label').textContent = '正常模式';
        document.querySelector('.sidebar-subtitle').textContent = '夜航控制台';
      }
    }

    renderStep();
  </script>
</body>
</html>
