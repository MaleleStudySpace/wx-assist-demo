<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wx-assist Feature Guide Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-main:#ffffff;--bg-card:#fafafa;--bg-raised:#f0f0f0;
      --bg-inset:#e8e8e8;--text-main:#0d0d0d;--text-muted:#5c5c5c;
      --border-main:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.12);
      --brand-green:#18E299;--brand-green-hover:#0fa76e;--brand-green-light:rgba(24,226,153,0.12);
      --status-info:#3772cf;--status-info-soft:rgba(55,114,207,0.08);
      --status-warn:#c37d0d;--status-warn-soft:rgba(195,125,13,0.08);
      --avatar-bg:#d4fae8;
      --highlight-ring:rgba(24,226,153,0.45);
    }
    .dark{
      --bg-main:#0a0a0a;--bg-card:#111111;--bg-raised:#181818;
      --bg-inset:#1e1e1e;--text-main:#e8e8e8;--text-muted:#777777;
      --border-main:rgba(255,255,255,0.06);--border-strong:rgba(255,255,255,0.10);
      --brand-green:#18E299;--brand-green-hover:#0fa76e;--brand-green-light:rgba(24,226,153,0.15);
      --status-info:#60a5fa;--status-info-soft:rgba(96,165,250,0.14);
      --status-warn:#fbbf24;--status-warn-soft:rgba(251,191,36,0.10);
      --avatar-bg:rgba(24,226,153,0.15);
      --highlight-ring:rgba(24,226,153,0.4);
    }
    body{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;background:var(--bg-main);color:var(--text-main);min-height:100vh;overflow:hidden}
    .ambient-glow{position:absolute;top:0;right:0;width:600px;height:600px;pointer-events:none;opacity:0.04;background:radial-gradient(circle,#18E299 0%,transparent 70%);filter:blur(80px)}

    /* Sidebar */
    .sidebar{position:fixed;left:0;top:0;width:224px;height:100vh;background:var(--bg-main);border-right:1px solid var(--border-main);z-index:40;display:flex;flex-direction:column;padding:20px}
    .sidebar-header{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .sidebar-logo{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-main);background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--brand-green);position:relative}
    .sidebar-logo-dot{position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--brand-green);box-shadow:0 0 0 2px var(--bg-main)}
    .sidebar-title{font-size:14px;font-weight:600}
    .sidebar-subtitle{font-size:11px;color:var(--text-muted);font-family:'Geist Mono',monospace;font-weight:500}
    .nav-item{display:flex;align-items:center;gap:12px;padding:8px 16px;border-radius:9999px;font-size:14px;color:var(--text-muted);font-weight:500;cursor:pointer;transition:all 0.2s;position:relative;user-select:none}
    .nav-item:hover{color:var(--text-main);background:rgba(24,24,24,0.6)}
    .nav-item.active{color:var(--brand-green);font-weight:600}
    .nav-item.active .nav-bg{opacity:1}
    .nav-bg{position:absolute;inset:0;border-radius:9999px;background:var(--brand-green-light);opacity:0;transition:opacity 0.3s;z-index:-1}
    .nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;position:relative}
    .nav-item.highlighted{animation:navPulse 2.5s ease-out;color:var(--brand-green)!important;font-weight:600!important}
    .nav-item.highlighted .nav-bg{opacity:1!important;animation:bgPulse 2.5s ease-out}
    @keyframes navPulse{0%{box-shadow:0 0 0 0 rgba(24,226,153,0)}12%{box-shadow:0 0 0 8px rgba(24,226,153,0.35)}25%{box-shadow:0 0 0 4px rgba(24,226,153,0.18)}40%{box-shadow:0 0 0 10px rgba(24,226,153,0.25)}100%{box-shadow:0 0 0 0 rgba(24,226,153,0)}}
    @keyframes bgPulse{0%{background:var(--brand-green-light)}50%{background:rgba(24,226,153,0.25)}100%{background:var(--brand-green-light)}}
    .nav-icon-dot{position:absolute;top:-1px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--brand-green);opacity:0;transform:scale(0);box-shadow:0 0 6px var(--brand-green)}
    .nav-item.highlighted .nav-icon-dot{animation:iconDotAppear 2.5s ease-out forwards}
    @keyframes iconDotAppear{0%{opacity:0;transform:scale(0)}10%{opacity:1;transform:scale(1.2)}20%{opacity:1;transform:scale(1)}80%{opacity:0.8}100%{opacity:0;transform:scale(0.5)}}

    /* Main */
    .main-content{margin-left:224px;min-height:100vh;position:relative}
    .top-bar{position:sticky;top:0;z-index:30;background:var(--bg-main);backdrop-filter:blur(12px);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-main);transition:padding-right 0.3s}
    .top-bar-title{font-size:14px;font-weight:600}
    .content-area{padding:32px;overflow:hidden;position:relative;transition:padding-right 0.3s}
    .page-view{animation:pageIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards}
    @keyframes pageIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}

    /* Shared UI */
    .card{background:var(--bg-card);border:1px solid var(--border-main);border-radius:16px;padding:24px;margin-bottom:16px}
    .section-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .section-dot{width:6px;height:20px;border-radius:3px;background:var(--brand-green)}
    .section-title{font-size:14px;font-weight:600}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:9999px;font-size:10px;font-weight:600}
    .pill-green{background:var(--brand-green-light);color:var(--brand-green);border:1px solid rgba(24,226,153,0.2)}
    .pill-muted{background:var(--bg-raised);color:var(--text-muted);border:1px solid var(--border-main)}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
    .stat-box{background:var(--bg-raised);border:1px solid var(--border-main);border-radius:16px;padding:16px}
    .stat-label{font-size:11px;color:var(--text-muted);font-weight:600}
    .stat-value{font-size:24px;font-weight:700;color:var(--text-main);font-family:'Geist Mono',monospace}
    .stat-sub{font-size:11px;color:var(--brand-green);font-weight:500}
    .btn-pill{padding:8px 20px;border-radius:9999px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
    .btn-green{background:var(--brand-green-hover);color:white}
    .input-mock{padding:10px 16px;background:var(--bg-main);border:1px solid var(--border-main);border-radius:9999px;font-size:13px;font-family:'Geist Mono',monospace;color:var(--text-muted)}
    .input-field{padding:16px;background:var(--bg-raised);border:1px solid var(--border-main);border-radius:12px}
    .field-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:8px}
    .row-item{padding:16px;background:var(--bg-raised);border:1px solid var(--border-main);border-radius:12px;margin-bottom:8px}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--avatar-bg,var(--brand-green-light))}
    .line{height:8px;border-radius:4px;background:var(--border-strong)}
    .line-s{width:60px}.line-m{width:120px}.line-xs{width:40px;height:6px}
    .bubble-self{align-self:flex-end;padding:8px 14px;background:rgba(24,226,153,0.12);border-radius:12px 12px 4px 12px;font-size:12px;max-width:70%}
    .bubble-other{align-self:flex-start;padding:8px 14px;background:var(--bg-raised);border-radius:12px 12px 12px 4px;font-size:12px;max-width:70%}

    /* Highlight */
    .guide-highlight{position:relative;z-index:10;border-radius:12px}
    .guide-highlight::after{content:'';position:absolute;inset:-4px;border-radius:inherit;border:2px solid var(--brand-green);box-shadow:0 0 12px var(--highlight-ring),0 0 24px rgba(24,226,153,0.1);animation:hlPulse 2s ease-in-out infinite;pointer-events:none;z-index:20}
    @keyframes hlPulse{0%,100%{opacity:0.4;box-shadow:0 0 8px var(--highlight-ring),0 0 16px rgba(24,226,153,0.08)}50%{opacity:1;box-shadow:0 0 16px var(--highlight-ring),0 0 32px rgba(24,226,153,0.15)}}
    .guide-highlight-active{animation:elBounce 0.6s cubic-bezier(0.16,1,0.3,1)}
    @keyframes elBounce{0%{transform:scale(1)}30%{transform:scale(1.03)}60%{transform:scale(0.99)}100%{transform:scale(1)}}

    /* ── AI Chat Drawer ── */
    .ai-drawer{
      position:fixed;top:0;right:0;width:420px;height:100vh;
      background:var(--drawer-bg);backdrop-filter:blur(28px) saturate(180%);
      border-left:1px solid var(--drawer-border);
      z-index:50;overflow:hidden;
      animation:drawerSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
      display:flex;flex-direction:column;
    }
    /* Default (light) drawer — stronger contrast on white bg */
    .ai-drawer{
      --drawer-bg:rgba(255,255,255,0.75);
      --drawer-border:rgba(0,0,0,0.1);
    }
    /* Dark drawer */
    .dark .ai-drawer{
      --drawer-bg:rgba(10,10,10,0.6);
      --drawer-border:rgba(255,255,255,0.08);
    }
    @keyframes drawerSlideIn{from{transform:translateX(420px)}to{transform:translateX(0)}}
    .ai-drawer-header{padding:16px 20px;border-bottom:1px solid var(--border-main);display:flex;align-items:center;justify-content:space-between}
    .ai-drawer-title{font-size:14px;font-weight:600}
    .ai-drawer-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border-main);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all 0.2s}
    .ai-drawer-close:hover{color:var(--text-main);background:var(--bg-raised)}
    .ai-drawer-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
    .ai-msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.65}
    .ai-msg-user{align-self:flex-end;background:rgba(24,226,153,0.12);color:var(--text-main)}
    .ai-msg-ai{align-self:flex-start;background:var(--bg-raised);border:1px solid var(--border-main);color:var(--text-main)}
    .ai-msg-ai-label{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11px;color:var(--brand-green);font-weight:600}
    .ai-msg-ai-label-dot{width:16px;height:16px;border-radius:50%;background:var(--brand-green-light);border:1px solid rgba(24,226,153,0.2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--brand-green);font-weight:700}
    .ai-typing{display:flex;align-items:center;gap:4px;padding:4px 0;color:var(--brand-green);font-size:12px}
    .ai-typing-dot{width:4px;height:4px;border-radius:50%;background:var(--brand-green);animation:typingBlink 1.4s infinite}
    .ai-typing-dot:nth-child(2){animation-delay:0.2s}
    .ai-typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes typingBlink{0%,60%,100%{opacity:0.2}30%{opacity:1}}
    .ai-drawer-footer{padding:16px 20px;border-top:1px solid var(--border-main)}
    .ai-token-bar{height:4px;background:var(--bg-inset);border-radius:2px;margin-top:8px;position:relative}
    .ai-token-fill{height:100%;border-radius:2px;transition:width 0.3s}
    .ai-token-fill-green{background:var(--brand-green)}
    .ai-token-fill-yellow{background:var(--status-warn)}
    .ai-compress-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:9999px;font-size:10px;font-weight:600;background:var(--status-warn-soft);color:var(--status-warn);border:1px solid rgba(251,191,36,0.2);margin-top:8px}
    .ai-input-row{display:flex;gap:8px}
    .ai-input{flex:1;padding:10px 16px;background:var(--bg-raised);border:1px solid var(--border-main);border-radius:9999px;font-size:13px;color:var(--text-main);font-family:inherit;outline:none}
    .ai-input:focus{border-color:var(--brand-green);box-shadow:0 0 0 2px rgba(24,226,153,0.15)}

    /* Guide Card - floating, position changes per step */
    .guide-overlay{position:fixed;inset:0;z-index:90;pointer-events:none}
    .guide-card{
      width:340px;
      background:var(--guide-bg);backdrop-filter:blur(28px) saturate(180%);
      border:1px solid var(--guide-border);border-radius:20px;overflow:hidden;
      box-shadow:var(--guide-shadow);
      animation:guideIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
      position:absolute;pointer-events:auto;
      transition:top 0.5s cubic-bezier(0.16,1,0.3,1),left 0.5s cubic-bezier(0.16,1,0.3,1),bottom 0.5s cubic-bezier(0.16,1,0.3,1),right 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    /* Default (light mode) glass — needs stronger contrast on white bg */
    .guide-card{
      --guide-bg:rgba(255,255,255,0.7);
      --guide-border:rgba(0,0,0,0.15);
      --guide-shadow:0 24px 80px rgba(0,0,0,0.12),0 0 0 1px rgba(24,226,153,0.1),inset 0 1px 0 rgba(255,255,255,0.5);
    }
    /* Dark mode glass — subtle on dark bg */
    .dark .guide-card{
      --guide-bg:rgba(10,10,10,0.5);
      --guide-border:rgba(255,255,255,0.1);
      --guide-shadow:0 24px 80px rgba(0,0,0,0.3),0 0 0 1px rgba(24,226,153,0.06),inset 0 1px 0 rgba(255,255,255,0.06);
    }
    @keyframes guideIn{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    .guide-progress{height:2px;background:var(--bg-inset)}
    .guide-progress-fill{height:100%;background:linear-gradient(90deg,var(--brand-green),var(--brand-green-hover));border-radius:1px;transition:width 0.4s cubic-bezier(0.16,1,0.3,1)}
    .guide-step{animation:stepIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards}
    @keyframes stepIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .guide-icon-wrap{width:48px;height:48px;border-radius:14px;background:var(--brand-green-light);border:1px solid rgba(24,226,153,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .guide-icon-wrap svg{width:24px;height:24px;color:var(--brand-green)}
    .guide-title{font-size:16px;font-weight:600;color:var(--text-main);margin-bottom:6px}
    .guide-desc{font-size:13px;color:var(--text-muted);line-height:1.65;margin-bottom:16px}
    .guide-features{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
    .guide-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:9999px;font-size:11px;font-weight:500;background:var(--bg-raised);border:1px solid var(--border-main);color:var(--text-muted)}
    .guide-chip-dot{width:4px;height:4px;border-radius:50%;background:var(--brand-green);flex-shrink:0}
    .guide-chip-hot{background:var(--brand-green-light)!important;border-color:rgba(24,226,153,0.2)!important;color:var(--brand-green)!important;font-weight:600!important}
    .guide-indicators{display:flex;align-items:center;gap:6px;margin-bottom:16px}
    .guide-dot{width:6px;height:6px;border-radius:50%;background:var(--border-strong);transition:all 0.3s;cursor:pointer}
    .guide-dot.active{background:var(--brand-green);width:22px;border-radius:3px}
    .guide-dot:hover:not(.active){background:rgba(255,255,255,0.25)}
    .guide-actions{display:flex;align-items:center;gap:10px;padding:16px 24px;border-top:1px solid var(--border-main)}
    .guide-btn{padding:8px 20px;border-radius:9999px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;outline:none;font-family:inherit}
    .guide-btn:active{transform:scale(0.97)}
    .guide-btn-primary{background:var(--brand-green-hover);color:white;flex:1}
    .guide-btn-primary:hover{opacity:0.9}
    .guide-btn-secondary{background:transparent;color:var(--text-muted);border:1px solid var(--border-main)}
    .guide-btn-secondary:hover{color:var(--text-main);border-color:rgba(255,255,255,0.15)}
    .guide-btn-skip{background:transparent;color:var(--text-muted);font-size:11px;padding:8px 0}
    .guide-btn-skip:hover{color:var(--text-main)}
    .guide-close{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:transparent;border:1px solid var(--border-main);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all 0.2s;z-index:10}
    .guide-close:hover{color:var(--text-main);border-color:rgba(255,255,255,0.15);background:var(--bg-raised)}
    .guide-step-counter{font-size:11px;font-family:'Geist Mono',monospace;color:var(--text-muted);font-weight:500}
    .welcome-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px 4px 8px;border-radius:9999px;font-size:11px;font-weight:600;background:var(--brand-green-light);border:1px solid rgba(24,226,153,0.2);color:var(--brand-green);margin-bottom:16px}
    .welcome-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--brand-green);position:relative}
    .welcome-badge-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--brand-green);animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite;opacity:0.6}
    @keyframes ping{0%{transform:scale(1);opacity:0.6}75%,100%{transform:scale(2.5);opacity:0}}

    /* Shrink main content when drawer is open */
    .main-content.shrunk{margin-right:420px;transition:margin-right 0.5s cubic-bezier(0.16,1,0.3,1)}
    .top-bar.shrunk{padding-right:calc(32px + 420px);transition:padding-right 0.5s cubic-bezier(0.16,1,0.3,1)}

    @media(prefers-reduced-motion:reduce){
      .guide-card,.guide-step,.page-view,.nav-item.highlighted,.welcome-badge-dot::after,.ai-drawer{animation:none!important}
      .guide-highlight::after{animation:none!important;opacity:1}
      .guide-card{transition:none!important}
      .main-content.shrunk,.top-bar.shrunk{transition:none!important}
    }
  </style>
</head>
<body>
  <div class="ambient-glow"></div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div style="flex:1">
      <div class="sidebar-header">
        <div class="sidebar-logo">W<div class="sidebar-logo-dot"></div></div>
        <div><div class="sidebar-title">微信助手</div><div class="sidebar-subtitle">夜航控制台</div></div>
      </div>
      <nav style="display:flex;flex-direction:column;gap:4px" id="nav-list">
        <div class="nav-item active" data-tab="welcome"><div class="nav-bg"></div><div class="nav-icon"><svg width="18" height="18" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="80" stroke="currentColor" stroke-width="16"/><path d="M100 140h56m-28-28v56" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg><div class="nav-icon-dot"></div></div><span style="z-index:2">欢迎</span></div>
        <div class="nav-item" data-tab="dashboard"><div class="nav-bg"></div><div class="nav-icon"><svg width="18" height="18" viewBox="0 0 256 256" fill="none"><path d="M32 48h192v160H32z" stroke="currentColor" stroke-width="16"/><path d="M32 136l56-40 48 32 56-48 32 24" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg><div class="nav-icon-dot"></div></div><span style="z-index:2">运行状态</span></div>
        <div class="nav-item" data-tab="config"><div class="nav-bg"></div><div class="nav-icon"><svg width="18" height="18" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="24" stroke="currentColor" stroke-width="16"/><path d="M128 32v24m0 144v24M32 128h24m144 0h24" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg><div class="nav-icon-dot"></div></div><span style="z-index:2">系统配置</span></div>
        <div class="nav-item" data-tab="assistant"><div class="nav-bg"></div><div class="nav-icon"><svg width="18" height="18" viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="80" stroke="currentColor" stroke-width="16"/><path d="M96 160h64m-32-32v32" stroke="currentColor" stroke-width="16" stroke-linecap="round"/><circle cx="96" cy="108" r="8" fill="currentColor"/><circle cx="160" cy="108" r="8" fill="currentColor"/></svg><div class="nav-icon-dot"></div></div><span style="z-index:2">群聊助手</span></div>

        highlights:['hl-protect','hl-contact','hl-post'],drawer:null
      },
      {

        cardPos:{bottom:'40px',right:'40px',transform:'none'},
        icon:'<svg width="24" height="24" viewBox="0 0 256 256" fill="none"><rect x="32" y="48" width="192" height="160" rx="8" stroke="currentColor" stroke-width="16"/><path d="M32 88h192" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg>',

      },
      {

        cardPos:{bottom:'40px',left:'260px',transform:'none'},
        icon:'<svg width="24" height="24" viewBox="0 0 256 256" fill="none"><path d="M40 48h176v160H40z" stroke="currentColor" stroke-width="16"/><path d="M72 96h112M72 128h80M72 160h48" stroke="currentColor" stroke-width="16" stroke-linecap="round"/></svg>',
        title:'运行日志',desc:'实时日志流、AI 交互记录、异常快速定位。',
        features:['实时日志流','AI 交互记录','异常定位'],
        highlights:['hl-log-ai','hl-log-digest'],drawer:null
      }
    ];

    let currentStep = 0;
    const navItems = document.querySelectorAll('.nav-item');
    const guideCard = document.getElementById('guide-card');
    const mainContent = document.getElementById('main-content');
    const topBar = document.getElementById('top-bar');
    const aiDrawerEl = document.getElementById('ai-drawer');

    function clearHighlights(){
      document.querySelectorAll('.guide-highlight').forEach(el=>el.classList.remove('guide-highlight','guide-highlight-active'));
    }

    function applyHighlights(ids){
      clearHighlights();
      ids.forEach((id,i)=>{
        setTimeout(()=>{
          const el=document.getElementById(id);
          if(el){el.classList.add('guide-highlight','guide-highlight-active');setTimeout(()=>el.classList.remove('guide-highlight-active'),600)}
        },i*300);
      });
    }

    function switchPage(tabId){
      document.getElementById('page-content').innerHTML=PAGES[tabId]||'';
      document.getElementById('page-title').textContent=TAB_LABELS[tabId]||'';
    }

    function highlightNav(tabId){
      navItems.forEach(item=>{item.classList.remove('highlighted','active');if(item.dataset.tab===tabId)item.classList.add('active','highlighted')});
    }

    // ── Position guide card ──
    function positionCard(pos){
      // Reset all position properties
      guideCard.style.top='auto';
      guideCard.style.bottom='auto';
      guideCard.style.left='auto';
      guideCard.style.right='auto';
      guideCard.style.transform='none';

      // Apply step-specific position
      if(pos.top) guideCard.style.top=pos.top;
      if(pos.bottom) guideCard.style.bottom=pos.bottom;
      if(pos.left) guideCard.style.left=pos.left;
      if(pos.right) guideCard.style.right=pos.right;
      if(pos.transform) guideCard.style.transform=pos.transform;
    }

    // ── Show / hide AI drawer ──
    function showDrawer(type){
      aiDrawerEl.style.display='block';
      aiDrawerEl.innerHTML = type==='chat' ? AI_DRAWER_CHAT : AI_DRAWER_FAV;
      mainContent.classList.add('shrunk');
      topBar.classList.add('shrunk');
    }
    function hideDrawer(){
      aiDrawerEl.style.display='none';
      aiDrawerEl.innerHTML='';
      mainContent.classList.remove('shrunk');
      topBar.classList.remove('shrunk');
    }

    // ── Render step ──
    function renderStep(){
      const step=GUIDE_STEPS[currentStep];
      const isLast=currentStep===GUIDE_STEPS.length-1;
      const content=document.getElementById('guide-step-content');

      // 1. Position the card FIRST
      positionCard(step.cardPos);

      // 2. Switch page
      clearHighlights();
      switchPage(step.tabId);
      highlightNav(step.tabId);

      // 3. Drawer
      if(step.drawer){showDrawer(step.drawer)}else{hideDrawer()}

      // 4. Guide content (delayed so page transition finishes first)
      content.style.opacity='0';content.style.transform='translateY(12px)';
      setTimeout(()=>{
        content.innerHTML=`
          <div class="guide-step">
            ${currentStep===0?'<div class="welcome-badge"><div class="welcome-badge-dot"></div>首次启动</div>':''}
            <div class="guide-icon-wrap">${step.icon}</div>
            <div style="display:flex;align-items:center;justify-content:space-between"><div class="guide-title">${step.title}</div><div class="guide-step-counter">${currentStep+1} / ${GUIDE_STEPS.length}</div></div>
            <div class="guide-desc">${step.desc}</div>
            ${step.features.length?`<div class="guide-features">${step.features.map((f,i)=>{
              // Highlight AI Chat feature chips in chats/favorites steps
              const hot=(step.drawer&&(i===0))?'guide-chip-hot':'';
              return `<div class="guide-chip ${hot}"><div class="guide-chip-dot"></div>${f}</div>`;
            }).join('')}</div>`:''}
          </div>`;
        content.style.opacity='1';content.style.transform='translateY(0)';
        content.style.transition='all 0.35s cubic-bezier(0.16,1,0.3,1)';
      },120);

      // 5. Staggered page highlights
      setTimeout(()=>{if(step.highlights.length)applyHighlights(step.highlights)},500);

      // 6. Progress + buttons
      document.getElementById('guide-progress-fill').style.width=`${((currentStep+1)/GUIDE_STEPS.length)*100}%`;
      document.getElementById('guide-indicators').innerHTML=GUIDE_STEPS.map((_,i)=>`<div class="guide-dot ${i===currentStep?'active':''}" onclick="goToStep(${i})"></div>`).join('');

      const prevBtn=document.getElementById('guide-prev');
      const nextBtn=document.getElementById('guide-next');
      prevBtn.style.display=currentStep>0?'inline-block':'none';
      if(isLast){nextBtn.textContent='开始使用';nextBtn.style.background='var(--brand-green)';nextBtn.style.color='#0a0a0a'}
      else{nextBtn.textContent='下一步';nextBtn.style.background='var(--brand-green-hover)';nextBtn.style.color='white'}
    }

    function goToStep(i){if(i>=0&&i<GUIDE_STEPS.length){currentStep=i;renderStep()}}
    function nextStep(){currentStep<GUIDE_STEPS.length-1?(currentStep++,renderStep()):finishGuide()}
    function prevStep(){currentStep>0?(currentStep--,renderStep()):null}

    function finishGuide(){
      const card=document.getElementById('guide-card');
      const overlay=document.getElementById('guide-overlay');
      clearHighlights();hideDrawer();
      card.style.transition='opacity 0.4s,transform 0.4s';
      card.style.opacity='0';card.style.transform='translateY(20px) scale(0.95)';
      setTimeout(()=>{overlay.style.display='none'},400);
      navItems.forEach(i=>i.classList.remove('active','highlighted'));
      document.querySelector('[data-tab="dashboard"]').classList.add('active');
      switchPage('dashboard');
      document.getElementById('page-title').textContent='运行状态';
    }

    document.getElementById('guide-next').addEventListener('click',nextStep);
    document.getElementById('guide-prev').addEventListener('click',prevStep);
    document.getElementById('guide-skip').addEventListener('click',finishGuide);
    document.getElementById('guide-close').addEventListener('click',finishGuide);
    document.addEventListener('keydown',e=>{
      if(document.getElementById('guide-overlay').style.display==='none')return;
      if(e.key==='ArrowRight'||e.key==='Enter')nextStep();
      if(e.key==='ArrowLeft')prevStep();
      if(e.key==='Escape')finishGuide();
    });

    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      if (isDark) {
        html.classList.remove('dark');
        document.getElementById('theme-icon').textContent = '🌙';
        document.getElementById('theme-label').textContent = '夜航控制台';
        document.querySelector('.sidebar-subtitle').textContent = '正常模式';
      } else {
        html.classList.add('dark');
        document.getElementById('theme-icon').textContent = '☀️';
        document.getElementById('theme-label').textContent = '正常模式';
        document.querySelector('.sidebar-subtitle').textContent = '夜航控制台';
      }
    }

    renderStep();
  </script>
</body>
